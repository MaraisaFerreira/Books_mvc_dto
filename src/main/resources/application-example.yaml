spring:
  application:
    name: books_mvc_dto
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/DB_NAME?useTimezone=true&serverTimezone=UTC
    username: USER
    password: PASSWORD
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: warn
    study.mf: info
    org.flyway: info